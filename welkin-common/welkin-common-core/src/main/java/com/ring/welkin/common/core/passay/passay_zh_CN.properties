##password validate messages
HISTORY_VIOLATION=密码与%1$s以前的密码之一匹配。
ILLEGAL_WORD=密码包含字典单词'%1$s'。
ILLEGAL_WORD_REVERSED=密码包含颠倒的字典单词'%1$s'。
ILLEGAL_DIGEST_WORD=密码包含字典单词。
ILLEGAL_DIGEST_WORD_REVERSED=密码包含一个颠倒的字典单词。
ILLEGAL_MATCH=密码与非法模式匹配'%1$s'。
ALLOWED_MATCH=密码必须与模式匹配'%1$s'。
ILLEGAL_CHAR=密码%2$s非法字符'%1$s'。
ALLOWED_CHAR=密码%2$s非法字符'%1$s'。
ILLEGAL_QWERTY_SEQUENCE=密码包含非法的键盘序列'%1$s'。
ILLEGAL_ALPHABETICAL_SEQUENCE=密码包含非法的字母顺序'%1$s'。
ILLEGAL_NUMERICAL_SEQUENCE=密码包含非法数字序列'%1$s'。
ILLEGAL_USERNAME=密码%2$s用户ID'%1$s'。
ILLEGAL_USERNAME_REVERSED=密码%2$s用户ID为'%1$s'。
ILLEGAL_WHITESPACE=密码%2$s一个空白字符。
ILLEGAL_NUMBER_RANGE=密码%2$s号码为'%1$s'。
INSUFFICIENT_UPPERCASE=密码必须包含%1$s个或多个大写字符。
INSUFFICIENT_LOWERCASE=密码必须包含%1$s个或多个小写字符。
INSUFFICIENT_ALPHABETICAL=密码必须包含%1$s个或多个字母字符。
INSUFFICIENT_DIGIT=密码必须包含%1$s个或多个数字字符。
INSUFFICIENT_SPECIAL=密码必须包含%1$s个或多个特殊字符。
INSUFFICIENT_CHARACTERISTICS=密码与前面%3$s项字符规则中的%1$s项匹配，但需要至少%2$s项匹配。
INSUFFICIENT_COMPLEXITY=密码符合%2$s复杂度规则，但需要%3$s。
INSUFFICIENT_COMPLEXITY_RULES=没有为长度为%1$s的密码配置规则。
SOURCE_VIOLATION=密码不能与您的%1$s密码相同。
TOO_LONG=密码长度不能超过%2$s个字符。
TOO_SHORT=密码长度最少需要%1$s个字符。
USER_PWD_IS_INITIAL=登录密码是初始密码，为了账户安全请先修改密码。
USER_PWD_IS_EXPIRED=登录密码已过期，为了账户安全请先修改密码。
USER_PWD_IS_FIRSTLOGIN=你是第一次登录，为了账户安全请先修改密码。