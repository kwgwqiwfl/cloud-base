spring.server.port=8081
spring.server.servlet.context-path=/lovin


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/quartz_test?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8&useSSL=true
spring.datasource.username=merce
spring.datasource.password=merce


## quartz config
#调度名称
spring.quartz.scheduler-name=${spring.application.name}
#初始化后自动调取调度程序
spring.quartz.auto-startup=true
#初始化后调取调度程序的延迟,这里配置初始化后10秒后调取调度程序
spring.quartz.startup-delay=PT10S
#在关闭服务的时候如果有任务正在运行就等待执行完毕后关闭
spring.quartz.wait-for-jobs-to-complete-on-shutdown=true
#配置的任务覆盖现有的任务
spring.quartz.overwrite-existing-jobs=true
#数据库方式:memory/jdbc,默认memory
spring.quartz.job-store-type=jdbc
#初始化表结构，3种模式:always-每次启动都初始化数据库、embedded-嵌入式、never-从不
spring.quartz.jdbc.initialize-schema=always
#用于初始化数据库模式的SQL文件的路径
#spring.quartz.jdbc.schema=classpath:org/quartz/impl/jdbcjobstore/tables_@@platform@@.sql
#默认主机名和时间戳生成实例ID,可以是任何字符串，但对于所有调度程序来说，必须是唯一的 对应qrtz_scheduler_state INSTANCE_NAME字段
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO
#调度实例名称，应该根据服务名称进行区分以实现调度的隔离，避免找不到调度任务类的错误
spring.quartz.properties.org.quartz.scheduler.instanceName=${spring.application.name}
#持久化配置，spring-boot-starter-quartz 2.5.7版本前使用org.quartz.impl.jdbcjobstore.JobStoreTX，之后使用org.springframework.scheduling.quartz.LocalDataSourceJobStore
spring.quartz.properties.org.quartz.jobStore.class=org.springframework.scheduling.quartz.LocalDataSourceJobStore
#我们仅为数据库制作了特定于数据库的代理
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate
#以指示JDBCJobStore将JobDataMaps中的所有值都作为字符串，因此可以作为名称 - 值对存储而不是在BLOB列中以其序列化形式存储更多复杂的对象。从长远来看，这是更安全的，因为您避免了将非String类序列化为BLOB的类版本问题。
spring.quartz.properties.org.quartz.jobStore.useProperties=false
#数据库表前缀,默认qrtz_
#spring.quartz.properties.org.quartz.jobStore.tablePrefix=qrtz_
#在被认为“失火”之前，调度程序将“容忍”一个Triggers将其下一个启动时间通过的毫秒数。默认值（如果您在配置中未输入此属性）为60000（60秒）。
spring.quartz.properties.org.quartz.jobStore.misfireThreshold=60000
#设置此实例“检入”*与群集的其他实例的频率（以毫秒为单位）。影响检测失败实例的速度。
spring.quartz.properties.org.quartz.jobStore.clusterCheckinInterval=5000
#打开群集功能
spring.quartz.properties.org.quartz.jobStore.isClustered=true
#线程池实现类
spring.quartz.properties.org.quartz.threadPool.class=org.quartz.simpl.SimpleThreadPool
#线程池线程数
spring.quartz.properties.org.quartz.threadPool.threadCount=10
#线程池优先级：可以是Thread.MIN_PRIORITY（即1）和Thread.MAX_PRIORITY（这是10）之间的任何int 。默认值为Thread.NORM_PRIORITY（5）
spring.quartz.properties.org.quartz.threadPool.threadPriority=5
#线程池线程继承Context ClassLoader初始化线程
spring.quartz.properties.org.quartz.threadPool.threadsInheritContextClassLoaderOfInitializingThread=true
